server:
  port: 8081

spring:
  application:
    name: user-management-service

  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: MallManagementSystemSecretKeyForJWTTokenGenerationMustBeAtLeast256Bits
  expiration: 86400000  # 24 hours in milliseconds
